                tagEl.textContent = tag;
                tagEl.onclick = () => toggleTag(tag);
                tagsContainer.appendChild(tagEl);
            });
        }

        // 切換標籤
        function toggleTag(tag) {
            const tagEls = document.querySelectorAll('.tag');
            tagEls.forEach(el => {
                if (el.textContent === tag) {
                    el.classList.toggle('active');
                }
            });

            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            
            performSearch();
        }

        // 執行搜尋
        function performSearch() {
            const query = document.getElementById('searchInput').value;
            const resultsContainer = document.getElementById('resultsContainer');

            let results;
            if (query.trim()) {
                results = fuse.search(query);
            } else {
                results = documents.map((doc, idx) => ({
                    item: doc,
                    refIndex: idx,
                    score: 0
                }));
            }

            // 篩選標籤
            if (selectedTags.size > 0) {
                results = results.filter(result => {
                    return Array.from(selectedTags).some(tag => result.item.tags.includes(tag));
                });
            }

            // 渲染結果
            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">沒有找到相關內容</div>';
                return;
            }

            resultsContainer.innerHTML = results.map(result => {
                const doc = result.item;
                const snippet = doc.content.substring(0, 80).replace(/\n/g, ' ');
                return `
                    <div class="result-item" onclick="openModal(${doc.id})">
                        <div class="result-title">${doc.title}</div>
                        <div class="result-snippet">${snippet}...</div>
                        <div class="result-tags">
                            ${doc.tags.map(tag => `<span class="result-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 打開詳細檢視
        function openModal(docId) {
            const doc = documents.find(d => d.id === docId);
            document.getElementById('modalTitle').textContent = doc.title;
            document.getElementById('modalSource').textContent = `來源：${doc.source}`;
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = doc.content.split('\n').map(line => 
                `<p>${line || '&nbsp;'}</p>`
            ).join('');

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // OCR 處理（背景執行，不阻塞 UI）
        async function ocrImages() {

        // 搜尋框監聽
        document.getElementById('searchInput').addEventListener('input', performSearch);

        // 初始化開始
        document.addEventListener('DOMContentLoaded', () => {
            init();
            document.getElementById('loading').style.display = 'none';
            performSearch();
        });

        // 關閉 modal 時點擊外部
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });
    </script>
